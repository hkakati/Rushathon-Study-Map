<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us – SkillRoute AI</title>
    <meta name="description" content="Get in touch with the SkillRoute AI team. We'd love to hear from you." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .contact-wrapper {
            min-height: calc(100vh - 64px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
        }
        .contact-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 560px;
            box-shadow: var(--shadow), var(--glow);
            animation: fadeIn .4s ease;
        }
        .contact-card .step-icon { font-size: 3rem; margin-bottom: 1rem; }
        .contact-card h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: .5rem;
        }
        .contact-card .sub {
            color: var(--text2);
            margin-bottom: 2rem;
            font-size: .95rem;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: .85rem;
            font-weight: 600;
            color: var(--text2);
            margin-bottom: .4rem;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: .75rem 1rem;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: .95rem;
            outline: none;
            transition: border-color .2s;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--primary);
        }
        .form-group textarea { resize: vertical; min-height: 110px; }
        .form-group select option { background: var(--card2); }
        .contact-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .contact-actions .btn-ghost { flex: 1; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .contact-actions .btn-primary { flex: 2; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-brand">
            <div class="nav-logo">⚡</div>
            <span class="nav-title">SkillRoute AI</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
        </div>
        <div class="nav-actions">
            <a href="contact.html" class="btn-secondary nav-icon-btn active-icon" title="Contact Us">📞</a>
            <a href="profile.html" class="btn-primary btn-sm">Login</a>
        </div>
    </nav>

    <div class="contact-wrapper">
        <div class="contact-card">
            <div class="step-icon">📞</div>
            <h1>Get in Touch</h1>
            <p class="sub">Have a question, feedback, or partnership inquiry? We'd love to hear from you. Fill out the form and we'll get back to you shortly.</p>

            <form id="contactForm" action="success.html" method="get">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="name" placeholder="Jane Doe" required />
                </div>
                <div class="form-group">
                    <label for="emailAddr">Email Address</label>
                    <input type="email" id="emailAddr" name="email" placeholder="jane@example.com" required />
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <select id="subject" name="subject">
                        <option value="general">General Inquiry</option>
                        <option value="support">Technical Support</option>
                        <option value="feedback">Feedback</option>
                        <option value="partnership">Partnership</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Tell us how we can help..." required></textarea>
                </div>
                <div class="contact-actions">
                    <a href="index.html" class="btn-ghost">← Back</a>
                    <button type="submit" class="btn-primary">Send Message 🚀</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
